<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=./product-intro/">
<title>帧语</title>
<link rel="icon" href="./assets/frameyu-logo.png" type="image/png">
<link rel="apple-touch-icon" href="./assets/frameyu-logo.png">
<link rel="stylesheet" href="./assets/frameyu-theme.css">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    background:
      linear-gradient(135deg, rgba(9, 8, 28, 0.96) 0%, rgba(29, 24, 91, 0.96) 42%, rgba(62, 28, 90, 0.96) 100%);
  }
  .splash {
    display: grid;
    gap: 18px;
    justify-items: center;
    text-align: center;
  }
  .splash img {
    width: 92px;
    height: 92px;
    object-fit: contain;
    filter: drop-shadow(0 22px 36px rgba(0,0,0,0.32));
  }
  .splash strong {
    font-size: 30px;
    font-weight: 900;
  }
  a { color: #ffd84d; text-decoration: none; }
</style>
</head>
<body>
  <div class="splash">
    <img src="./assets/frameyu-logo.png" alt="帧语">
    <strong>帧语</strong>
    <p>正在进入帧语产品介绍页... <a href="./product-intro/">立即打开</a></p>
  </div>
</body>
</html>
